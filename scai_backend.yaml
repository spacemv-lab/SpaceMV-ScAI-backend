---
# ==========================================
# 1. Account Backend (端口 5001)
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: account-backend
  namespace: scai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: account-backend
  template:
    metadata:
      labels:
        app: account-backend
    spec:
      imagePullSecrets:
      - name: harbor-auth-secret
      containers:
      - name: account-backend
        image: ci.txxw.com/scai-test/scai_backend:1.0.0
        imagePullPolicy: Always
        workingDir: /workspace/account_backend
        command: ["python"]
        args: ["app.py"]
        ports:
        - containerPort: 5001
        env:
        - name: SERVER_PORT
          value: "5001"
        - name: LANG
          value: "C.UTF-8"
        - name: LC_ALL
          value: "C.UTF-8"
        resources:
          requests:
            memory: "500Mi"  # 修复为 500Mi
            cpu: "20m"
          limits:
            memory: "1Gi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: account-backend-svc
  namespace: scai
spec:
  selector:
    app: account-backend
  ports:
    - port: 5001
      targetPort: 5001

---
# ==========================================
# 2. Serve Backend (端口 8401)
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: serve-backend
  namespace: scai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: serve-backend
  template:
    metadata:
      labels:
        app: serve-backend
    spec:
      # nodeName: your-node-name # 强烈建议：如果是多节点集群，取消注释并填入含有该目录的宿主机节点名
      imagePullSecrets:
      - name: harbor-auth-secret
      containers:
      - name: serve-backend
        image: ci.txxw.com/scai-test/scai_backend:1.0.0
        imagePullPolicy: Always
        workingDir: /workspace/serve_backend
        command: ["python"]
        args: ["app.py"]
        ports:
        - containerPort: 8401
        env:
        - name: SERVER_PORT
          value: "8401"
        - name: LANG
          value: "C.UTF-8"
        - name: LC_ALL
          value: "C.UTF-8"
        resources:
          requests:
            memory: "500Mi"  # 修复为 500Mi
            cpu: "50m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        # ========== 新增挂载配置 ==========
        volumeMounts:
        - name: serve-output-volume
          mountPath: /workspace/serve_backend/output/
      volumes:
      - name: serve-output-volume
        hostPath:
          path: "/root/k8s/scai/ScAI backend/serve_backend/output/"
          type: DirectoryOrCreate

---
apiVersion: v1
kind: Service
metadata:
  name: serve-backend-svc
  namespace: scai
spec:
  selector:
    app: serve-backend
  ports:
    - port: 8401
      targetPort: 8401

---
# ==========================================
# 3. Visual Backend (Streamlit, 端口 8501)
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: visual-backend
  namespace: scai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: visual-backend
  template:
    metadata:
      labels:
        app: visual-backend
    spec:
      # nodeName: your-node-name # 强烈建议：如果是多节点集群，取消注释并填入含有该目录的宿主机节点名
      imagePullSecrets:
      - name: harbor-auth-secret
      containers:
      - name: visual-backend
        image: ci.txxw.com/scai-test/scai_backend:1.0.0
        imagePullPolicy: Always
        workingDir: /workspace/visual_backend
        command: ["python"]
        args: ["-m", "streamlit", "run", "app_notiles.py", "--server.headless", "true"]
        ports:
        - containerPort: 8501
        env:
        - name: SERVER_PORT
          value: "8501"
        - name: LANG
          value: "C.UTF-8"
        - name: LC_ALL
          value: "C.UTF-8"
        resources:
          requests:
            memory: "500Mi"  # 修复为 500Mi
            cpu: "50m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        # ========== 新增挂载配置 ==========
        volumeMounts:
        - name: serve-output-volume
          mountPath: /workspace/serve_backend/output/
      volumes:
      - name: serve-output-volume
        hostPath:
          path: "/root/k8s/scai/ScAI backend/serve_backend/output/"
          type: DirectoryOrCreate

---
apiVersion: v1
kind: Service
metadata:
  name: visual-backend-svc
  namespace: scai
spec:
  selector:
    app: visual-backend
  ports:
    - port: 8501
      targetPort: 8501